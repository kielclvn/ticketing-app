<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- mobile scaling -->
    <title>Logged Out - Ticket System</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f0f0; margin: 0; padding: 0; text-align: center; }
        .logout-box {
            margin: 60px auto;
            width: 90%;
            max-width: 400px;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }
        h1 { color: #333; margin-bottom: 15px; }
        p { font-size: 1.1em; margin-bottom: 20px; }
        a {
            display: inline-block;
            margin: 10px;
            padding: 12px 18px;
            background: #4CAF50;
            color: white;
            border-radius: 6px;
            font-weight: bold;
            text-decoration: none;
        }
        a:hover { background: #45a049; }
    </style>
</head>
<body>
    <div class="logout-box">
        <h1>👋 You’ve been logged out</h1>
        <p>Thank you for using the COE WEEK 2026 Ticket System.</p>
        <a href="/login">🔑 Login Again</a>
        <a href="/form">🎟️ Generate Tickets</a>
    </div>
</body>
</html>
